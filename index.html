<!DOCTYPE html>
<!-- v=1784797923 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Trade V4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080816;color:#c8c8e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px;min-width:1200px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#444;border-radius:2px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:#0c0c24;border:2px solid #404080;border-radius:8px}
.pulse{width:12px;height:12px;border-radius:50%;animation:pulse 2s infinite}
.pulse.go{background:#00e676}.pulse.caution{background:#ffd740}.pulse.stop{background:#ff5252}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.verdict{padding:6px 18px;border-radius:4px;font-size:16px;font-weight:700}
.verdict.go{background:#003315;color:#00e676;border:1px solid #00e67633}
.verdict.caution{background:#1a1a10;color:#ffd740;border:1px solid #ffd74033}


/* PAM TAB */
.tabs{display:flex;gap:0;margin:2px 0 0 0}
.tab{padding:8px 24px;font-size:13px;font-weight:600;border:2px solid #404080;border-bottom:2px solid #0c0c24;border-radius:8px 8px 0 0;cursor:pointer;background:#06061a;color:#6060a0}
.tab.active{background:#0c0c24;color:#ffd740;border-color:#ffd74040 #404080 #0c0c24}
.tab:hover:not(.active){color:#9090c0}
#pamTab{flex:1;min-height:0;display:none;flex-direction:column;gap:6px}
#pamTab .main{display:grid;grid-template-columns:380px 1fr;gap:6px;flex:1;min-height:0;height:100%}
.pam-asset-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-bottom:1px solid #12122a;font-size:14px}
.pam-asset-row .aname{font-weight:700;color:#ffd740;min-width:80px}
.pam-asset-row .aprice{font-size:14px;color:#e0e0f0}
.pam-asset-row .atag{font-size:11px;padding:2px 8px;border-radius:3px}
.atag.fire{background:#003315;color:#00e676;border:1px solid #00e676}
.atag.monitor{background:#151530;color:#8080c0}
.atag.closed{background:#101020;color:#404060}
.pam-signal-card{background:#0e0e20;border-radius:4px;padding:8px 10px;margin:4px 0;border-left:3px solid #404080;cursor:pointer}
.pam-signal-card:hover{border-left-color:#ffd740}
.pam-signal-card.fire{border-left-color:#00e676}
.pam-signal-card .ps-hdr{display:flex;justify-content:space-between;align-items:center;font-size:14px}
.pam-signal-card .ps-bar{height:5px;background:#111130;border-radius:2px;margin:5px 0;position:relative}
.pam-signal-card .ps-bar-f{height:5px;border-radius:2px;min-width:2%}
.pam-signal-card .ps-thresh{position:absolute;top:-1px;height:7px;width:2px;background:#ffd740;opacity:0.6}
.pam-signal-card .ps-crit{font-size:12px;color:#707090;padding:1px 0;display:flex;align-items:center;gap:4px}
.pam-signal-card .ps-crit .pcbar{width:50px;height:3px;background:#111130;border-radius:1px}
.pam-signal-card .ps-crit .pcbar-f{height:3px;border-radius:1px;min-width:2%}
.pam-no-signals{color:#555;text-align:center;padding:20px;font-size:13px}


/* PRICES */
.prices{display:flex;gap:10px;background:#0c0c24;border:2px solid #404080;border-radius:8px;padding:8px 16px;font-size:14px;overflow-x:auto}
.prices span{margin-right:14px;white-space:nowrap}
.prices .sym{color:#7070aa;font-size:11px}
.prices .val{font-weight:600}.up{color:#00e676}.dn{color:#ff5252}

/* MAIN GRID */
.main{display:grid;grid-template-columns:380px 1fr;gap:6px;flex:1;min-height:0}

/* LEFT PANEL */
.left{display:flex;flex-direction:column;gap:6px}
.panel{background:#0c0c24;border:2px solid #404080;border-radius:8px;padding:12px 14px}
.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#6060a0;margin-bottom:10px}

/* REGIME */
.regime-big{font-size:28px;font-weight:700;text-align:center;padding:6px}
.regime-big.risk-on{color:#00e676}.regime-big.risk-off{color:#ff5252}.regime-big.neutral{color:#ffd740}
.regime-reasons{font-size:13px;color:#999;text-align:center}

/* SESSIONS */
.sessions{font-size:12px;color:#888;text-align:center;margin-top:6px}

/* SETUPS COMPACT */
.setup-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px;border-bottom:1px solid #12122a}
.setup-row:last-child{border:none}
.setup-name{font-weight:600;width:60px}
.setup-score{font-size:13px;padding:3px 8px;border-radius:3px}
.setup-score.long{background:#003315;color:#00e676}
.setup-score.short{background:#310015;color:#ff5252}
.setup-score.none{color:#999}
.setup-score.closed{color:#666}
.setup-score.premarket{color:#aaa}
.setup-asset{font-weight:700;padding:5px 0 2px;font-size:13px;border-bottom:1px solid #1a1a38;cursor:pointer}
.setup-asset:hover{color:#ffd740}
.setup-sub{display:flex;align-items:center;padding:2px 0;font-size:11px}
.scard{background:#0e0e20;border-radius:4px;padding:5px 8px;margin:3px 0}
.scard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:14px}
.scard-bar{height:6px;background:#111130;border-radius:2px;margin:4px 0;overflow:hidden;position:relative}
.scard-bar span{display:block;height:100%;border-radius:2px;transition:width 0.5s}
.scard-crit{font-size:13px;color:#777;padding:2px 0;display:flex;align-items:center}
.scard-crit.grn{color:#55aa55}
.scard-gap{font-size:13px;color:#999;text-align:right;margin-bottom:3px}

/* 8-STEP MINI */
.steps-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;font-size:11px;text-align:center}
.steps-mini div{padding:6px 3px;border-radius:3px;background:#111130}
.steps-mini .pass{border:1px solid #00e67644;color:#00e676}
.steps-mini .warn{border:1px solid #ffd74044;color:#ffd740}
.steps-mini .skip{border:1px solid #333;color:#777}

/* RIGHT PANEL */
.right{display:flex;flex-direction:column;gap:6px;min-height:0}

/* POSITIONS */
.pos-grid-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:8px;margin-bottom:8px}
.pos-card{background:#141428;border-radius:6px;padding:14px;border-left:3px solid #22d3ee}
.pos-card.winner{border-left-color:#00e676}
.pos-card.loser{border-left-color:#ff5252}
.pos-card h4{font-size:16px;margin-bottom:8px}
.pos-card .pnl-big{font-size:30px;font-weight:700;text-align:center;padding:6px 0}
.pos-card .pnl-big.up{color:#00e676}.pos-card .pnl-big.dn{color:#ff5252}
.pos-card .detail-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.pos-card .detail-row .lbl{color:#7070aa;font-size:13px}
.pos-card .detail-row .hl{font-weight:600;color:#ffd740;font-size:13px}
.pos-card .detail-row .gr{color:#00e676;font-size:13px}
.pos-card .detail-row .rd{color:#ff5252;font-size:13px}

/* JOURNAL TABLE */
.journal-table{width:100%;font-size:14px;border-collapse:collapse}
.journal-table th{text-align:left;padding:5px 10px;color:#5050a0;border-bottom:1px solid #1c1c44;font-size:13px;font-weight:500;position:sticky;top:0;background:#0c0c24}
.journal-table td{padding:5px 10px;border-bottom:1px solid #12122a;font-variant-numeric:tabular-nums}
.journal-table tr.open-row{background:#141430}
.journal-table tr.closed-row{}
.journal-empty{color:#555;font-size:15px;text-align:center;padding:24px}

/* SUMMARY ROW */
.summary{background:#0c0c24;border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;gap:4px;font-size:14px}
.summary .sr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;padding:4px 0;border-bottom:1px solid #1a1a38;text-align:center;align-items:center;gap:2px;font-size:13px}
.summary .sr:last-child{border:none;font-weight:700}
.summary .sr .asset{color:#ffd740;text-align:left}
.summary .sr>*{border-right:1px solid #151530;padding:0 3px}
.summary .sr>*:last-child{border-right:none}
.summary .sr .val{font-variant-numeric:tabular-nums}
.summary .sr .grn{color:#00e676}
.summary .sr .red{color:#ff5252}
.summary .sr .ylw{color:#ffd740}
.summary .hdr-row{color:#6060a0;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #202050;padding-bottom:6px}
.summary .total-row{background:#101030;border-radius:4px;border-top:2px solid #303060;margin-top:4px;padding:8px 12px!important;box-shadow:0 0 12px rgba(48,48,96,0.3)}

.footer{text-align:center;font-size:11px;color:#444;padding:6px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <div class="pulse go" id="pulse"></div>
    <h1>Trade V4</h1>
    <span style="font-size:13px;color:#777" id="timeDisp">--</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;font-weight:700;color:#ffd740" id="capDisp">$10,000</span>
    <div class="verdict caution" id="verdict">MONITOR</div>
  </div>
</div>

<!-- PRICES -->
<div class="prices" id="prices"></div>

<!-- MAIN -->
<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="panel">
      <h3>🌍 REGIME</h3>
      <div class="regime-big neutral" id="regimeTxt">--</div>
      <div class="regime-reasons" id="regimeReasons"></div>
      <div class="sessions" id="sessionInfo"></div>
      <div id="corrWarn" style="font-size:11px;color:#ffd740;margin-top:4px"></div>
      <div id="horizonMatrix" style="margin-top:6px"></div>
      <div id="newsEvents" style="font-size:12px;color:#ffd740;margin-top:4px"></div>
    </div>

    <div class="panel" style="flex:1;overflow-y:auto;min-height:0">
      <h3>🎯 SETUPS</h3>
      <div id="setupList"></div>
    </div>

    <div class="panel">
      <h3>📋 PIPELINE</h3>
      <div class="steps-mini" id="stepStatus"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="panel" style="flex:1;overflow-y:auto;min-height:0">
      <h3>📌 POSITIONS</h3>
      <div id="posPanel"></div>
    </div>
    <div class="panel" style="flex:1;overflow-y:auto;min-height:0">
      <h3>📝 JOURNAL</h3>
      <div id="journalContent"><div class="journal-empty">No entries</div></div>
    </div>

    <div class="panel" style="padding:6px 10px">
      <h3 style="margin-bottom:4px">📊 ACCOUNT</h3>
      <div class="summary" id="summaryBar"></div>
    </div>
</div>

<div class="footer">Trade V4 · XAU+AAPL+META+GOOGL+MSFT · 15m</div>

</div>
<div id="pamTab"></div>
<script>
const STATE_URL = '/tarde-v4/trade_v4_state.json';
const JOURNAL_URL = '/tarde-v4/trade_v4_journal.json';
const POS_URL = '/tarde-v4/trade_v4_positions.json';

async function fetchJSON(url) {
  try { const r = await fetch(url, {cache:'no-store'}); return r.ok ? r.json() : null; }
  catch(e) { return null; }
}

function render() {
  // Fetch live JSON, fallback to embedded if available
  Promise.all([fetchJSON(STATE_URL), fetchJSON(JOURNAL_URL), fetchJSON(POS_URL)])
    .then(([state, journal, positions]) => {
      state = state || window.__STATE;
      journal = journal || window.__JOURNAL;
      positions = positions || window.__POSITIONS;
      if (state) renderState(state);
      if (journal || positions) renderJournal(journal, positions, state);
    });
}

function renderState(s) {
  const sum = s.summary || s;
  const steps = s.steps || {};
  const regime = steps.regime || {};
  const setups = (steps.setup || {}).assets || {};
  const sessions = s.sessions || steps._sessions || {};

  // Verdict
  const v = document.getElementById('verdict'), p = document.getElementById('pulse');
  if (sum.signal_active) { v.textContent = '🟢 SIGNAL'; v.className = 'verdict go'; p.className = 'pulse go'; }
  else if (sum.overall === 'GO') { v.textContent = '🟡 MONITOR'; v.className = 'verdict caution'; p.className = 'pulse caution'; }
  else { v.textContent = '🔴 CAUTION'; v.className = 'verdict caution'; p.className = 'pulse stop'; }

  // Capital
  const cap = s.compounded_capital || steps.capital || 10000;
  const capEl = document.getElementById('capDisp');
  capEl.textContent = '$' + cap.toLocaleString('en-US', {maximumFractionDigits: 0});
  const initialCap = 10000;
  const capChange = cap - initialCap;
  capEl.style.color = capChange >= 0 ? '#00e676' : '#ff5252';

  document.getElementById('timeDisp').textContent = new Date(sum.timestamp).toLocaleString('en-US',{timeZone:'Asia/Singapore',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:true}).replace(',','');

  // Regime
  const rt = document.getElementById('regimeTxt');
  rt.textContent = regime.regime || '?';
  rt.className = 'regime-big ' + (regime.regime||'').toLowerCase();
  document.getElementById('regimeReasons').innerHTML = (regime.reasons||[]).map(r => `• ${r}`).join('<br>');
  // News/economic events
  const newsDiv = document.getElementById('newsEvents');
  const hm = document.getElementById('horizonMatrix');
  if (hm && s.horizon_matrix) {
    const curReg = (s.regime || '').toLowerCase().replace(' ','-');
    const hzns = Object.keys(s.horizon_matrix);
    const rows = ['risk-on','neutral','risk-off'];
    const labels = {'risk-on':'RISK-ON','neutral':'NEUTRAL','risk-off':'RISK-OFF'};
    let mh = '<table style="width:100%;font-size:11px;border-collapse:collapse;margin-top:4px"><tr style="color:#6060a0"><td style="padding:2px 4px"></td>';
    for (const h of hzns) mh += '<td style="padding:2px 4px;text-align:center">' + h + '</td>';
    mh += '</tr>';
    for (const r of rows) {
      const isCur = r === curReg;
      const rclr = r === 'risk-on' ? '#003315' : (r === 'risk-off' ? '#310015' : '#151530');
      const rbd = isCur ? 'border-left:3px solid #ffd740;' : '';
      mh += '<tr style="background:' + rclr + ';' + rbd + '"><td style="padding:2px 4px;color:' + (isCur?'#ffd740':'#8080c0') + ';font-weight:' + (isCur?'700':'400') + '">' + labels[r] + '</td>';
      for (const h of hzns) {
        const bias = (s.horizon_matrix[h]||{})[r] || 'free';
        const clr = bias === 'LONG' ? '#00e676' : (bias === 'SHORT' ? '#ff5252' : '#6060a0');
        mh += '<td style="padding:2px 4px;text-align:center;color:' + clr + ';font-weight:600;font-size:12px">' + bias + '</td>';
      }
      mh += '</tr>';
    }
    mh += '</table>';
    hm.innerHTML = mh;
  }
  const newsEl = document.getElementById('newsEvents');

  if (newsDiv) {
    const news = s.news || [];
    newsDiv.innerHTML = news.map(n => n).join('<br>');
    newsDiv.style.display = news.length ? '' : 'none';
  }

  // Sessions
  const g = sessions.gold ? '🟢' : '⚫';
  const st = sessions.stocks ? '🟢' : (sessions.stocks_display ? '🟡' : '🔴');
  document.getElementById('sessionInfo').innerHTML = `Gold ${g} &nbsp; Stocks ${st}`;

  // Prices — regime + trading assets
  const pdiv = document.getElementById('prices');
  const assetPrices = {};
  for (const [asset, data] of Object.entries(setups)) {
    if (data.price) assetPrices[asset] = data.price;
  }
  let priceHTML = '';
  if (regime.assets) {
    priceHTML += Object.entries(regime.assets).map(([k,v]) =>
      `<span><span class="sym">${k}</span><span class="val ${v.chg_5d>=0?'up':'dn'}">${v.price?'$'+v.price.toFixed(1):'--'}</span></span>`
    ).join('');
    priceHTML += '<span style="color:#444">|</span>';
  }
  priceHTML += Object.entries(assetPrices).map(([k,v]) =>
    `<span><span class="sym">${k}</span><span class="val" style="color:#ffd740">$${v.toFixed(2)}</span></span>`
  ).join('');
  pdiv.innerHTML = priceHTML;

  // Correlation warnings
  const corr = steps.correlation || {};
  document.getElementById('corrWarn').innerHTML = (corr.warnings||[]).map(w => `⚠️ ${w}`).join('<br>');

  // Setups — score cards with criteria breakdown
  let sh = '';
  for (const [asset, data] of Object.entries(setups)) {
    const isClosed = data.status === 'OUTSIDE_HOURS';
    const isPreMkt = data.status === 'PRE_MARKET' || data.status === 'GAP';
    const allSigs = data.all_signals || [];

    if (isClosed) {
      sh += `<div class="setup-row"><span class="setup-name">${asset}</span><span class="setup-score closed">CLOSED</span></div>`;
      continue;
    }
    if (isPreMkt) {
      sh += `<div class="setup-row"><span class="setup-name">${asset}</span><span>$${data.price?.toFixed(1)||'--'}</span><span class="setup-score premarket">PRE</span></div>`;
      continue;
    }

    // Collapsible asset header
    const best = allSigs.reduce((a,b) => (a.score||0) >= (b.score||0) ? a : b, {score:0, max_possible:1});
    const bestPct = best.max_possible > 0 ? (best.score / best.max_possible * 100) : 0;
    const clr = bestPct >= 60 ? '#00e676' : (bestPct >= 40 ? '#ffd740' : '#ff5252');
    const n = allSigs.length;
    const uid = 's_' + asset;
    sh += `<div class="setup-asset" onclick="var d=document.getElementById('${uid}');d.style.display=d.style.display==='none'?'block':'none';window._collapsed=window._collapsed||{};window._collapsed['${uid}']=d.style.display==='none'" style="cursor:pointer;user-select:none">
      <span>▶ ${asset}</span>
      <span style="color:${clr};font-weight:700;float:right;margin-left:8px">${bestPct.toFixed(0)}%</span>
      <span style="color:#ffd740;float:right">$${data.price?.toFixed(1)||'--'}</span>
    </div>`;
    sh += `<div id="${uid}" style="display:block">`;

    // Only show best setup by default
    const shown = allSigs.filter(s => s === best || (s.score||0) > 0);
    const hidden = allSigs.filter(s => s !== best && (s.score||0) <= 0);
    const showAll = allSigs.length <= 1 || bestPct >= 50; // Expand if close or few

    for (const si of (showAll ? allSigs : shown)) {
      const mp = si.max_possible || 1;
      const pct = (si.score / mp * 100);
      const barClr = pct >= 60 ? '#00e676' : (pct >= 40 ? '#ffd740' : '#ff5252');
      const isSig = si.passed;
      const details = si.details || [];

      // Score card — full criteria breakdown
      sh += `<div class="scard" style="border-left:3px solid ${barClr}">
        <div class="scard-hdr">
          <span style="font-weight:600;font-size:14px">${si.setup.replace(/_/g,' ')}</span>
          <span style="font-size:12px;color:#888">${si.direction||'—'}</span>
          <span style="font-weight:700;font-size:${isSig?'20':'18'}px;color:${isSig?'#00e676':barClr}">${pct.toFixed(0)}<span style="font-size:12px">%</span></span>
          <span style="font-size:12px;color:#777">${si.score.toFixed(0)}/${mp}</span>
        </div>
        <div class="scard-bar">
          <span style="width:${Math.min(100,pct)}%;background:${barClr}"></span>
          <span style="position:absolute;left:60%;width:1px;height:4px;background:#fff3;top:0"></span>
        </div>
        <div class="scard-gap" style="font-size:9px;color:#888;text-align:right">${pct>=60?'✅':'Need '+(60-pct).toFixed(0)+'% more'}</div>`;

      // Individual criteria bars
      const critLines = details.filter(d => d.includes('/'));
      for (const d of critLines) {
        const green = d.startsWith('+');
        const m = d.match(/([\d.]+)\/([\d.]+)/);
        if (m) {
          const sc = parseFloat(m[1]), mx = parseFloat(m[2]);
          const cp = mx>0 ? sc/mx*100 : 0;
          const label = d.split('[')[1]?.split(']')[0] || '';
          const name = d.split('] ')[1] || '';
          sh += `<div class="scard-crit ${green?'grn':''}">
            <span style="width:70px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block">${name}</span>
            <span style="flex:1;margin:0 8px;height:5px;background:#111130;border-radius:2px;display:inline-block;vertical-align:middle;position:relative">
              <span style="display:block;height:100%;width:${Math.max(2,cp)}%;background:${green?'#55aa55':'#333'};border-radius:2px"></span>
            </span>
            <span style="font-size:12px;color:${green?'#88aa88':'#666'}">${sc.toFixed(1)}/${mx}</span>
          </div>`;
        }
      }
      sh += `</div>`;
    }
    // Close collapsible wrapper
    sh += `</div>`;
    if (hidden.length > 0) {
      sh += `<div style="text-align:center;font-size:10px;color:#555;padding:2px 0;cursor:pointer" onclick="var c=document.getElementById('${uid}');c.style.display='block';c.querySelectorAll('.scard').forEach(function(x){x.style.display=''});this.style.display='none'">+${hidden.length} more</div>`;
    }
  }
  document.getElementById('setupList').innerHTML = sh;
  // Restore collapsed state
  if (window._collapsed) {
    for (const [id, state] of Object.entries(window._collapsed)) {
      const el = document.getElementById(id);
      if (el && state) el.style.display = 'none';
    }
  }

  // 8-step
  document.getElementById('stepStatus').innerHTML = [
    {n:1,l:'Regime',s:regime.status},
    {n:2,l:'Correl',s:(steps.correlation||{}).status},
    {n:3,l:'Setup',s:(steps.setup||{}).status},
    {n:4,l:'Inst',s:'PASS'},
    {n:5,l:'Size',s:sum.signal_active?'RDY':'SKIP'},
    {n:6,l:'Entry',s:sum.signal_active?'RDY':'SKIP'},
    {n:7,l:'S+TP',s:sum.signal_active?'RDY':'SKIP'},
    {n:8,l:'Journal',s:'LOG'},
  ].map(st=>`<div class="${st.s==='PASS'||st.s==='RDY'||st.s==='LOG'?'pass':st.s==='WARN'||st.s==='SIGNAL'?'warn':'skip'}">${st.n}<br>${st.l}</div>`).join('');
}

function renderJournal(journal, positions, s) {
  const events = [];

  // Journal scan entries — skip if no signals and no events
  if (journal && journal.entries) {
    for (const e of journal.entries) {
      const hasContent = (e.signals||[]).length > 0 || (e.events||[]).length > 0;
      if (hasContent) {
        const label = (e.events||[]).join('; ') || 'scan';
        events.push({ts:e.timestamp||'',type:'scan',regime:e.regime||'?',signals:label,events:e.events||[]});
      }
    }
  }

  // Positions
  let totalTrades = 0, totalWins = 0, totalR = 0;
  if (positions) {
    for (const p of (positions.closed || [])) {
      events.push({ts:p.closed_at||'',type:'close',asset:p.asset,dir:p.direction,entry:p.entry,exit:p.exit,reason:p.exit_reason,pnl_r:p.pnl_r,pnl_pct:p.pnl_pct,setup:p.setup});
      totalTrades++;
      if ((p.pnl_r||0) > 0) totalWins++;
      totalR += (p.pnl_r||0);
    }
    for (const p of (positions.open || [])) {
      events.push({ts:p.created_at||p.opened_at||'',type:'open',asset:p.asset,dir:p.direction,entry:p.entry,sl:p.sl,tp:p.tp,setup:p.setup,ur:p.unrealised_r,price:p.current_price,regime:p.regime});
    }
  }

  events.sort((a,b) => b.ts.localeCompare(a.ts));

  // Constants (must be before position tile rendering)
  const INIT_CAPITAL = 10000;
  const goldAllocPct = 0.10, stockAllocPct = 0.90;
  const goldTickers = 1, stockTickers = 4;
  const initGold = INIT_CAPITAL * goldAllocPct;
  const initStocks = INIT_CAPITAL * stockAllocPct;
  const rValGold = initGold * 0.02;
  const rValStock = (initStocks / stockTickers) * 0.02;
  const capital = (s && (s.compounded_capital || (s.steps && s.steps.capital))) || INIT_CAPITAL;

  // Active positions — tiled grid
  let posHtml = '<div class="pos-grid-container">';
  const openPos = (positions||{}).open || [];
  for (const p of openPos) {
    const ur = p.unrealised_r || 0;
    const urCls = ur >= 0 ? 'up' : 'dn';
    // Standardise: P&L = R × R-value. 1R = 2% of allocation.
    const margin = p.asset === 'XAUUSD' ? initGold : (initStocks / stockTickers);
    const rVal = p.asset === 'XAUUSD' ? rValGold : rValStock;
    const entryPx = p.entry || 1;
    const currentPx = p.current_price || entryPx;
    const pnlDollar = (p.unrealised_r || 0) * rVal;
    const pnlCls = pnlDollar >= 0 ? '#00e676' : '#ff5252';
    posHtml += `<div class="pos-card ${pnlDollar>0?'winner':(pnlDollar<0?'loser':'')}">
      <h4>${p.asset} <span style="color:#888">${p.direction.toUpperCase()}</span> <span style="font-size:10px;color:#666">${p.setup||''}</span></h4>
      <div class="pnl-big" style="color:${pnlCls}">${pnlDollar>=0?'+':''}$${Math.abs(pnlDollar).toFixed(0)}</div>
      <div class="detail-row"><span class="lbl">Entry</span><span class="hl">$${(p.entry||0).toFixed(2)}</span></div>
      <div class="detail-row"><span class="lbl">Current</span><span>$${(p.current_price||0).toFixed(2)}</span></div>
      <div class="detail-row"><span class="lbl">Stop</span><span class="rd">$${(p.sl||0).toFixed(2)}</span></div>
      <div class="detail-row"><span class="lbl">Target</span><span class="gr">$${(p.tp||0).toFixed(2)}</span></div>
      <div class="detail-row"><span class="lbl">RPS</span><span>$${(p.rps||0).toFixed(2)} (${p.rps&&p.entry?((p.rps/p.entry)*100).toFixed(2):'--'}%)</span></div>
      <div class="detail-row"><span class="lbl">Alloc</span><span>$${margin} · 1R=$${rVal.toFixed(0)}</span></div>
      <div class="detail-row"><span class="lbl">Opened</span><span style="color:#888">${new Date(p.created_at||p.opened_at).toLocaleString('en-US',{timeZone:'Asia/Singapore',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:true}).replace(',','')}</span></div>
    </div>`;
  }
  posHtml += '</div>';
  document.getElementById('posPanel').innerHTML = posHtml;

  // Journal table
  const recent = events.slice(0, 30);
  if (!recent.length) {
    document.getElementById('journalContent').innerHTML = '<div class="journal-empty">No entries yet</div>';
    document.getElementById('summaryBar').innerHTML = '';
    return;
  }

  let h = '<table class="journal-table"><tr><th>Time</th><th>Type</th><th>Asset</th><th>Setup</th><th>Entry</th><th>Exit</th><th>P&L</th></tr>';
  for (const e of recent) {
    const ts = new Date(e.ts).toLocaleString('en-US',{timeZone:'Asia/Singapore',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:true}).replace(',','');
    const rPerAsset = e.asset === 'XAUUSD' ? rValGold : rValStock;
    if (e.type === 'scan') {
      h += `<tr><td>${ts}</td><td style="color:#444">📡</td><td>—</td><td style="color:#666">${e.regime||'?'}</td><td>—</td><td>—</td><td style="color:#666">${e.signals}</td></tr>`;
    } else if (e.type === 'open') {
      h += `<tr class="open-row"><td>${ts}</td><td style="color:#22d3ee">OPEN</td><td style="font-weight:600">${e.asset}</td><td style="color:#888">${e.setup||''} ${e.dir}</td><td>$${(e.entry||0).toFixed(2)}</td><td style="color:#888">SL $${(e.sl||0).toFixed(1)}</td><td style="color:#888">R=$${rPerAsset.toFixed(0)}</td></tr>`;
    } else if (e.type === 'close') {
      const clr = (e.pnl_r||0)>=0?'#00e676':'#ff5252';
      const actualDollar = (e.pnl_r||0) * rPerAsset;
      const pnlPct = (e.pnl_pct||0);
      const capAfter = e.capital_after ? ' → $'+e.capital_after.toLocaleString('en-US',{maximumFractionDigits:0}) : '';
      h += `<tr class="closed-row"><td>${ts}</td><td style="color:${clr}">${e.reason==='TP'?'<span style="background:#003315;border:1px solid #00e676;color:#00e676;padding:2px 6px;border-radius:3px;font-weight:700">✅ TP</span>':'<span style="background:#310015;border:1px solid #ff5252;color:#ff5252;padding:2px 6px;border-radius:3px;font-weight:700">❌ SL</span>'}</td><td style="font-weight:600">${e.asset}</td><td style="color:#888">${e.setup||''} ${e.dir}</td><td>$${(e.entry||0).toFixed(2)}</td><td>$${(e.exit||0).toFixed(2)}</td><td style="color:${clr};font-weight:700">${actualDollar>=0?'+':''}$${Math.abs(actualDollar).toFixed(0)} (${(e.pnl_r||0)>=0?'+':''}${e.pnl_r}R, ${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%)${capAfter}</td></tr>`;
    }
  }
  h += '</table>';
  document.getElementById('journalContent').innerHTML = h;

  // Summary bar — all in $
  const wr = totalTrades > 0 ? (totalWins/totalTrades*100).toFixed(0) : '—';
  // Calculate realised by asset
  let xauRealised = 0, stockRealised = 0, xauUnrealised = 0, stockUnrealised = 0;
  let xauTrades = 0, stockTrades = 0, xauWins = 0, stockWins = 0;
  if (positions) {
    for (const p of (positions.closed || [])) {
      const d = (p.pnl_r||0) * (p.asset==='XAUUSD'?rValGold:rValStock);
      if (p.asset === 'XAUUSD') {
        xauRealised += d; xauTrades++; if ((p.pnl_r||0) > 0) xauWins++;
      } else {
        stockRealised += d; stockTrades++; if ((p.pnl_r||0) > 0) stockWins++;
      }
    }
  }
  for (const p of openPos) {
    const rVal = p.asset === 'XAUUSD' ? rValGold : rValStock;
    const d = (p.unrealised_r||0) * rVal;
    if (p.asset === 'XAUUSD') xauUnrealised += d; else stockUnrealised += d;
  }
  const totalRealised = xauRealised + stockRealised;
  const totalUnrealised = xauUnrealised + stockUnrealised;
  const equity = capital + totalUnrealised;  // capital already includes realised
  const eqChange = ((equity / capital - 1) * 100).toFixed(1);
  const fmt = v => `${v>=0?'+':''}$${Math.abs(v).toFixed(0)}`;
  const clr = v => v>=0?'grn':'red';
  const currentAllocXau = equity * goldAllocPct;
  const currentAllocStock = equity * stockAllocPct;
  document.getElementById('summaryBar').innerHTML = `
    <div class="sr hdr-row"><span class="asset">Asset</span><span>Init Capital</span><span>Alloc%</span><span>Curr Alloc</span><span>Tickers</span><span>Alloc/Ticker</span><span>Trades</span><span>Win Rate</span><span>Realised</span></div>
    <div class="sr"><span class="asset">XAU</span><span>$${initGold}</span><span>${goldAllocPct*100}%</span><span>$${currentAllocXau.toFixed(0)}</span><span>${goldTickers}</span><span>$${initGold/goldTickers}</span><span>${xauTrades}</span><span>${xauTrades>0?(xauWins/xauTrades*100).toFixed(0):'—'}%</span><span class="${clr(xauRealised)}">${fmt(xauRealised)}</span></div>
    <div class="sr"><span class="asset">Stocks</span><span>$${initStocks}</span><span>${stockAllocPct*100}%</span><span>$${currentAllocStock.toFixed(0)}</span><span>${stockTickers}</span><span>$${initStocks/stockTickers}</span><span>${stockTrades}</span><span>${stockTrades>0?(stockWins/stockTrades*100).toFixed(0):'—'}%</span><span class="${clr(stockRealised)}">${fmt(stockRealised)}</span></div>
    <div class="sr total-row">
      <span class="asset" style="font-size:15px;color:#fff">Total</span>
      <span style="color:#aaa">$${INIT_CAPITAL.toLocaleString()}</span>
      <span style="color:#aaa">100%</span>
      <span style="color:#aaa">$${(currentAllocXau+currentAllocStock).toFixed(0)}</span>
      <span>${goldTickers+stockTickers}</span>
      <span style="color:#aaa">—</span>
      <span>${totalTrades}</span>
      <span>${wr}%</span>
      <span style="font-weight:700;font-size:17px;color:${clr(totalRealised)}">${fmt(totalRealised)} <span style="font-size:12px;color:#aaa">${eqChange>=0?'↑':'↓'}${Math.abs(eqChange)}%</span></span>
    </div>
    <div class="sr" style="font-weight:400;color:#666;font-size:12px;border:none"><span class="asset"></span><span></span><span></span><span></span><span></span><span></span><span></span><span>${totalWins} won · ${openPos.length} active</span></div>
  `;
}


// === PAM TAB (JS-built, no HTML restructuring) ===
(function(){
  const PAM_URL = '/tarde-v4/pam/pam_state.json';
  const TH = 55;
  let currentTab = 'v4';

  // Build tab bar
  const tabs = document.createElement('div');
  tabs.className = 'tabs';
  tabs.innerHTML = '<div class="tab active" id="tbV4" onclick="switchTab(\'v4\')">Trade V4</div><div class="tab" id="tbPAM" onclick="switchTab(\'pam\')">PAM</div>';
  const prices = document.getElementById('prices');
  prices.parentNode.insertBefore(tabs, prices);

  // Get V4 main and PAM container
  const v4Main = document.querySelector('.main');
  const pamTab = document.getElementById('pamTab');
  pamTab.innerHTML = '<div class="main"><div class="left"><div class="panel"><h3>REGIME</h3><div class="regime-big neutral" id="pRegime">--</div><div class="regime-reasons" id="pReasons"></div><div id="phorizonMatrix" style="margin-top:6px"></div><div id="pCorrWarn" style="font-size:11px;color:#ffd740;margin-top:4px"></div></div><div class="panel" style="flex:1;overflow-y:auto;min-height:0"><h3>SIGNALS</h3><div id="pSetupList"></div></div></div><div class="right"><div class="panel" style="flex:1;overflow-y:auto;min-height:0"><h3>PRICE STRIP</h3><div id="pPriceStrip"></div><div id="pBonusStrip" style="font-size:12px;color:#ffd740;margin-top:8px"></div></div></div></div>';

  window.switchTab = function(tab) {
    currentTab = tab;
    v4Main.style.display = tab === 'v4' ? '' : 'none';
    pamTab.style.display = tab === 'pam' ? 'flex' : 'none';
    document.getElementById('tbV4').className = 'tab' + (tab === 'v4' ? ' active' : '');
    document.getElementById('tbPAM').className = 'tab' + (tab === 'pam' ? ' active' : '');
    if (tab === 'pam') fetchPAM();
  };

  async function fetchPAM() {
    try {
      const [pr, vr] = await Promise.all([
        fetch(PAM_URL, {cache:'no-store'}),
        fetch(STATE_URL, {cache:'no-store'})
      ]);
      if (!pr.ok) return;
      const pamData = await pr.json();
      if (vr.ok) {
        const v4Data = await vr.json();
        pamData.regime = v4Data.regime;
        pamData.correlation = v4Data.steps?.correlation || pamData.correlation;
        pamData.regimeReasons = (v4Data.steps?.regime?.reasons || []);
        pamData.news = v4Data.news || pamData.news || [];
      }
      renderPAM(pamData);
    } catch(e) {}
  }

  function renderPAM(d) {
    if (!d) return;
    const regime = d.regime || 'NEUTRAL';
    const rt = document.getElementById('pRegime');
    rt.textContent = regime;
    rt.className = 'regime-big ' + regime.toLowerCase().replace(' ','-');
    document.getElementById('pReasons').innerHTML = (d.regimeReasons||(d.correlation||{}).warnings||[]).slice(0,2).map(function(r){return '• '+r}).join('<br>');
    var hm = document.getElementById('phorizonMatrix');
    if (hm && d.horizon_matrix) {
      var cr = (d.regime||'').toLowerCase().replace(' ','-');
      var hk = Object.keys(d.horizon_matrix);
      var rs = ['risk-on','neutral','risk-off'], lb = {'risk-on':'RISK-ON','neutral':'NEUTRAL','risk-off':'RISK-OFF'};
      var mh = '<table style="width:100%;font-size:11px;border-collapse:collapse;margin-top:4px"><tr style="color:#6060a0"><td></td>';
      for (var i=0;i<hk.length;i++) mh += '<td style="text-align:center">'+hk[i]+'</td>';
      mh += '</tr>';
      for (var ri=0;ri<rs.length;ri++) {
        var r=rs[ri], ic=r===cr, bc=r==='risk-on'?'#003315':(r==='risk-off'?'#310015':'#151530');
        mh += '<tr style="background:'+bc+';'+(ic?'border-left:3px solid #ffd740;':'')+'"><td style="color:'+(ic?'#ffd740':'#8080c0')+';font-weight:'+(ic?'700':'400')+'">'+lb[r]+'</td>';
        for (var j=0;j<hk.length;j++) {
          var b=(d.horizon_matrix[hk[j]]||{})[r]||'free';
          mh += '<td style="text-align:center;color:'+(b==='LONG'?'#00e676':b==='SHORT'?'#ff5252':'#6060a0')+';font-weight:600;font-size:12px">'+b+'</td>';
        }
        mh += '</tr>';
      }
      mh += '</table>'; hm.innerHTML = mh;
    }
    var pd = document.getElementById('pCorrWarn');
    pd.innerHTML = (d.news||[]).join('<br>');
    pd.style.color = '#ffd740';
    const setups = d.setups || {};
    let ph='', sl='', ba=[];
    for (const asset in setups) {
      const a = setups[asset];
      const price = (a.price||0).toFixed(2);
      const st = a.status || 'PASS';
      const sig = a.signal;
      const all = a.all_signals || [];
      let tc='monitor', tt='scan';
      if (st==='SIGNAL' && sig) { tc='fire'; tt=sig.setup+' '+sig.direction.toUpperCase()+' '+sig.score_pct+'%'; }
      else if (st==='OUTSIDE_HOURS') { tc='closed'; tt='CLOSED'; }
      else if (st==='PRE_MARKET') { tc='monitor'; tt='PRE'; }
      else if (st==='GAP') { tc='closed'; tt='GAP'; }
      ph+='<div class="pam-asset-row"><span class="aname">'+asset+'</span><span class="aprice">$'+price+'</span><span class="atag '+tc+'">'+tt+'</span></div>';
      if (a.bonus_details) ba=ba.concat(a.bonus_details);
      if (st==='OUTSIDE_HOURS'||st==='PRE_MARKET'||st==='GAP') continue;
      for (let i=0;i<all.length;i++) {
        const s=all[i];
        if (s.score<=0 && all.length>1) continue;
        const sp=s.score_pct||0, mp=s.max_possible||1;
        const uid='px_'+asset+'_'+s.setup+'_'+s.direction;
        const fire = sig&&sig.setup===s.setup&&sig.direction===s.direction;
        let bc='#404080';
        if (sp>=TH) bc='#00e676'; else if (sp>=TH-10) bc='#ffc107';
        let ch='';
        const crits=(s.details||[]).filter(function(x){return x.indexOf('/')>=0});
        for (let j=0;j<crits.length;j++) {
          const c=crits[j];
          const m=c.match(/\[(\d+(?:\.\d+)?)\/(\d+)\]\s*(.+)/);
          if (!m) continue;
          const sc=parseFloat(m[1]), mx=parseFloat(m[2]), nm=m[3];
          const cp=Math.max(2,(sc/mx)*100);
          const act=sc>0;
          const cc=act?'#00e676':'#303040';
          ch+='<div class="ps-crit"><span style="width:8px;color:'+(act?'#00e676':'#444')+'">'+(act?'+':' ')+'</span><span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+nm+'</span><span class="pcbar"><div class="pcbar-f" style="width:'+cp+'%;background:'+cc+'"></div></span><span style="font-size:11px;color:#606080;width:32px;text-align:right">'+sc+'/'+mx+'</span></div>';
        }
        sl+='<div class="pam-signal-card'+(fire?' fire':'')+'" onclick="var ce=document.getElementById(\''+uid+'\');ce.style.display=ce.style.display===\'none\'?\'block\':\'none\'"><div class="ps-hdr"><div><span style="font-weight:600;color:#ffd740">'+asset+'</span> <span style="font-size:12px;color:#8080c0">'+s.setup+'</span> <span style="font-size:12px;color:#888">'+s.direction.toUpperCase()+'</span></div><div style="text-align:right"><div style="font-size:20px;font-weight:700;color:'+bc+'">'+sp.toFixed(0)+'<span style="font-size:12px">%</span></div><div style="font-size:11px;color:#606080">('+s.score.toFixed(0)+'/'+mp+')</div></div></div><div class="ps-bar"><div class="ps-bar-f" style="width:'+Math.min(100,sp)+'%;background:'+bc+'"></div><div class="ps-thresh" style="left:'+TH+'%"></div></div><div id="'+uid+'" style="display:none">'+ch+'</div></div>';
      }
    }
    document.getElementById('pPriceStrip').innerHTML=ph||'<div class="pam-no-signals">No price data</div>';
    document.getElementById('pSetupList').innerHTML=sl||'<div class="pam-no-signals">No setups scored</div>';
    const bu=[]; for(let k=0;k<ba.length;k++){if(bu.indexOf(ba[k])<0)bu.push(ba[k]);}
    document.getElementById('pBonusStrip').innerHTML=bu.length?bu.join(' | '):'';
  }

  fetchPAM();
})();


render();
setInterval(render, 15000);
</script>
</body>
